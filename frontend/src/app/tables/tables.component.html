<div class="window-page">
  <div class="window-box">
    <div class="window-header"></div>

    <div class="window-content text-center">
      <h1 class="window-title">Tables disponibles</h1>

      <p *ngIf="loading" class="mt-4 text-muted">Chargement...</p>

      <p *ngIf="error" class="mt-4 text-danger small">{{ error }}</p>

      <div *ngIf="!loading && !error" class="d-flex justify-content-center mt-4">

        <!-- Noms des tables -->
        <ul class="list-unstyled text-start me-4">
          <li *ngFor="let t of tables" class="mb-3">• {{ t }}</li>
        </ul>

        <div class="btn-column text-start">
          <div *ngFor="let t of tables" class="d-flex gap-2 mb-3">
            <button
              class="btn btn-outline-dark window-button"
              (click)="voirAnalyse(t)"
            >
              Voir analyse
            </button>
            <button
              class="btn btn-outline-secondary"
              (click)="voirCleaning(t)"
            >
              Nettoyer
            </button>
          </div>
        </div>

      </div>

      <p *ngIf="!loading && !error && tables.length === 0" class="mt-4 text-muted">
        Aucune table disponible.
      </p>

      <!-- Bouton résumé global -->
      <div *ngIf="!loading && tables.length > 0" class="mt-4">
        <button class="btn btn-outline-dark w-100" (click)="voirResume()">
          Voir le résumé global de toutes les tables
        </button>
      </div>

      <!-- Liste des clients -->
      <div *ngIf="clients.length > 0" class="mt-4 text-start">
        <p><strong>Clients</strong></p>
        <div *ngFor="let c of clients" class="d-flex justify-content-between align-items-center mb-2">
          <span>{{ c.nom }}</span>
          <button class="btn btn-sm btn-outline-dark" (click)="voirClient(c.id)">
            Voir le détail
          </button>
        </div>
      </div>

    </div>
  </div>
</div>
